<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>국회의원 — RepView</title>
  <meta name="description" content="우리 지역 국회의원의 표결 참여율, 불참, 대표 발의, 최근 표결·법안 기록을 한눈에 확인하세요." />
  <link rel="stylesheet" href="/css/style.css?v=20260405a" />
</head>
<body>

  <nav class="nav">
    <a class="nav-back" href="index.html" data-i18n="nav.back.search">&#8592; 검색</a>
    <span class="nav-member-name" id="nav-member-name"></span>
  </nav>

  <section class="member-poster">
    <div class="member-poster-media">
      <img class="member-poster-photo" id="hero-photo" src="" alt="" />
    </div>

    <div class="member-poster-overlay"></div>

    <div class="member-poster-content">
      <p class="poster-kicker" id="hero-committee"></p>

      <h1 class="poster-name" id="hero-name"></h1>
      <p class="poster-meta" id="hero-meta"></p>
    </div>

    <div class="scroll-hint">
      <span class="scroll-hint-arrow">↓</span>
      <span data-i18n="member.scroll.hint">아래로 내려 전체 기록 보기</span>
    </div>
  </section>

  <section class="stat-section section--dark">
    <div class="stat-frame">
      <div class="stat-number fade-in" id="stat-attendance" data-count="0">0</div>
      <div class="stat-unit fade-in delay-1">%</div>
      <div class="stat-label fade-in delay-2" data-i18n="member.stat.vote">표결 참여율</div>
      <div class="stat-context fade-in delay-3" data-i18n="member.stat.vote.context">전체 표결 대비 실제 참여 비율</div>
    </div>
  </section>

  <section class="stat-section section--dark">
    <div class="stat-frame">
      <div class="stat-number fade-in" id="stat-bills" data-count="0">0</div>
      <div class="stat-label fade-in delay-1" data-i18n="member.stat.absent">불참</div>
      <div class="stat-context fade-in delay-2" data-i18n="member.stat.absent.context">현 임기 내 표결 불참 횟수</div>
    </div>
  </section>

  <section class="votes-section" id="absent-votes-section">
    <div class="votes-inner">
      <h2 class="votes-header fade-in" id="absent-votes-header">최근 불참 표결</h2>
      <p class="votes-subheader fade-in delay-1" id="absent-votes-subheader">최근 표결 중 불참한 안건입니다.</p>
      <div id="absent-vote-list"></div>
      <div class="votes-more-wrap">
        <button id="absent-more-btn" class="votes-more-btn" type="button">불참 표결 더 보기</button>
      </div>
    </div>
  </section>

  <section class="votes-section">
    <div class="votes-inner">
      <h2 class="votes-header fade-in" data-i18n="member.votes.title">이렇게 표결했습니다.</h2>
      <p class="votes-subheader fade-in delay-1" data-i18n="member.votes.sub">최근 국회 표결과 해당 의원의 선택을 보여줍니다.</p>
      <div id="vote-list"></div>
    </div>
  </section>

  <section class="stat-section section--light">
    <div class="stat-frame stat-frame--light">
      <div class="stat-number fade-in" id="stat-vote" data-count="0">0</div>
      <div class="stat-label fade-in delay-1" data-i18n="member.stat.bills">대표 발의 수</div>
      <div class="stat-context fade-in delay-2" data-i18n="member.stat.bills.context">현 임기 내 대표 발의 기준</div>
      <div class="bill-callout fade-in delay-3" id="bill-callout"></div>
    </div>
  </section>

  <section class="activity-section">
    <div class="activity-inner">
      <div class="activity-header fade-in" data-i18n="member.activity.title">현재 활동</div>
      <div id="activity-wrap"></div>
    </div>
  </section>

  <section class="share-section">
    <div class="share-card" id="rep-summary"></div>
    <div class="share-actions">
      <button id="save-image-btn" class="share-action-btn" type="button">이미지 저장</button>
      <button id="share-btn" class="share-action-btn" type="button">공유</button>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="/js/app.js?v=20260405a"></script>
  <script src="/js/member.js?v=20260405a"></script>
</body>
</html>

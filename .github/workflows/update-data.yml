name: Update Assembly Data

on:
  schedule:
    # 03:00 KST daily (18:00 UTC)
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies (if package.json exists)
        run: |
          if [ -f package.json ]; then
            npm ci || npm install
          fi

      - name: Fetch members
        env:
          ASSEMBLY_API_KEY: ${{ secrets.ASSEMBLY_API_KEY }}
        run: node scripts/fetchMembers.js

      - name: Fetch bills
        env:
          ASSEMBLY_API_KEY: ${{ secrets.ASSEMBLY_API_KEY }}
        run: node scripts/fetchBills.js

      - name: Fetch votes
        env:
          ASSEMBLY_API_KEY: ${{ secrets.ASSEMBLY_API_KEY }}
        run: node scripts/fetchVotes.js

      - name: Build representatives
        run: node scripts/buildRepresentatives.js

      - name: Commit and push if changed
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/members.json data/raw/bills_raw.json data/raw/votes_raw.json data/app/representatives.json
          if git diff --cached --quiet; then
            echo "No tracked data changes to commit."
            exit 0
          fi

          git commit -m "chore: daily data update"
          git push
